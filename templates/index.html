<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Car Value Estimator</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f0f0f0;
      font-family: 'Segoe UI', sans-serif;
      padding: 2rem;
    }

    .container {
      background: #fff;
      border-radius: 16px;
      overflow: hidden;
      position: relative;
      width: 100%;
      max-width: 720px;
      min-height: 500px;
      display: flex;
      box-shadow: 0 8px 32px rgba(0,0,0,0.12);
    }

    .form-panel {
      width: 55%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.75rem;
    }

    .toggle-panel {
      width: 45%;
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .toggle-panel svg {
      width: 56px;
      height: 56px;
      margin-bottom: 1.25rem;
      opacity: 0.9;
    }

    .toggle-panel h2 {
      color: #fff;
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 0.75rem;
      text-align: center;
    }

    .toggle-panel p {
      color: rgba(255,255,255,0.65);
      font-size: 13px;
      text-align: center;
      line-height: 1.7;
    }

    .form-panel h2 {
      font-size: 20px;
      font-weight: 600;
      color: #1a1a2e;
      margin-bottom: 1.25rem;
      align-self: flex-start;
    }

    form { width: 100%; }

    .field {
      width: 100%;
      margin-bottom: 0.65rem;
    }

    .field label {
      display: block;
      font-size: 10px;
      color: #888;
      margin-bottom: 3px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .field input,
    .field select {
      width: 100%;
      height: 36px;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      background: #fafafa;
      color: #1a1a2e;
      font-size: 13px;
      padding: 0 10px;
      outline: none;
      transition: border-color 0.2s;
      font-family: inherit;
    }

    .field input:focus,
    .field select:focus {
      border-color: #1a1a2e;
      background: #fff;
    }

    .row { display: flex; gap: 10px; }
    .row .field { flex: 1; }

    .submit-btn {
      width: 100%;
      margin-top: 0.75rem;
      height: 38px;
      border-radius: 19px;
      background: #1a1a2e;
      color: #fff;
      border: none;
      font-size: 13px;
      font-family: inherit;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .submit-btn:hover { opacity: 0.85; }
  </style>
</head>
<body>

  <div class="container">

    <!-- Form Panel -->
    <div class="form-panel">
      <h2>Car Value Estimator</h2>

      <form method="POST" action="/">
        <div class="row">
          <div class="field">
            <label>Make</label>
            <input type="text" name="make" placeholder="e.g. Toyota" required>
          </div>
          <div class="field">
            <label>Model</label>
            <input type="text" name="model" placeholder="e.g. Camry" required>
          </div>
        </div>

        <div class="field">
          <label>Original Price ($)</label>
          <input type="number" name="price" placeholder="e.g. 30000" required>
        </div>

        <div class="row">
          <div class="field">
            <label>Age (years)</label>
            <input type="number" name="age" placeholder="e.g. 5" required>
          </div>
          <div class="field">
            <label>Mileage</label>
            <input type="number" name="mileage" placeholder="e.g. 60000" required>
          </div>
        </div>

        <div class="field">
          <label>Vehicle Type</label>
          <select name="vehicle_type">
            <option value="sedan">Sedan</option>
            <option value="suv">SUV</option>
            <option value="truck">Truck</option>
            <option value="luxury">Luxury</option>
          </select>
        </div>

        <button class="submit-btn" type="submit">Calculate Value</button>
      </form>
    </div>

    <div class="toggle-panel">
      <svg viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="56" height="56" rx="16" fill="rgba(255,255,255,0.08)"/>
        <path d="M10 30l4-10h28l4 10" stroke="rgba(255,255,255,0.5)" stroke-width="1.5" stroke-linecap="round"/>
        <rect x="8" y="30" width="40" height="10" rx="3" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.4)" stroke-width="1.2"/>
        <circle cx="17" cy="42" r="3.5" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.6)" stroke-width="1.2"/>
        <circle cx="39" cy="42" r="3.5" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.6)" stroke-width="1.2"/>
        <path d="M15 28l2.5-6h21l2.5 6H15z" fill="rgba(255,255,255,0.12)"/>
      </svg>
      <h2>Know Your Car's Worth</h2>
      <p>Fill in your vehicle details and we'll estimate its current market value, plus a plain-English breakdown.</p>
    </div>

  </div>

</body>
</html>
