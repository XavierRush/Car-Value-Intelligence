<!DOCTYPE html>
<html>

<head>
    <title>Car Value Results</title>
</head>

<body>

    <h1>Results</h1>

    <p>Estimated Value: ${{ value }}</p>
    <p>Estimated Yearly Costs:</p>

        <li>Fuel: ${{ costs["fuel"] }}</li>
        <li>Maintenance: ${{ costs["maintenance"] }}</li>
        <li>Insurance: ${{ costs["insurance"] }}</li>

    <p>Recommendation: {{ recommendation }}</p>

    <a href="/">Go back</a>

</body>

</html>
